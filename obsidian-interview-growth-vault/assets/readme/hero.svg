<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian AI 面试自生长库</title>
  <desc id="desc">从简历、JD、真题和真实面试反馈持续生长的本地求职知识库</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151126"/>
      <stop offset="0.55" stop-color="#2b1748"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>
  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <circle cx="1060" cy="70" r="145" fill="#7c3aed" opacity=".22" filter="url(#glow)"/>
  <circle cx="160" cy="410" r="130" fill="#2563eb" opacity=".16" filter="url(#glow)"/>
  <g transform="translate(72 65)">
    <rect width="74" height="74" rx="18" fill="#7c3aed"/>
    <path d="M37 12 57 31 49 59 25 62 15 38 23 18Z" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
    <path d="m23 18 26 41M57 31 25 62M15 38l42-7" stroke="#fff" stroke-width="2.5" opacity=".7"/>
  </g>
  <text x="72" y="196" fill="#fff" font-family="Inter,Segoe UI,Noto Sans SC,sans-serif" font-size="52" font-weight="750">AI × Obsidian 面试自生长库</text>
  <text x="74" y="244" fill="#d8d4e8" font-family="Inter,Segoe UI,Noto Sans SC,sans-serif" font-size="24">不是一次性的面试题文档，而是一套会被真实反馈持续校准的求职系统</text>
  <g font-family="Inter,Segoe UI,Noto Sans SC,sans-serif" font-size="18" font-weight="600">
    <rect x="74" y="290" width="150" height="42" rx="21" fill="#ffffff" opacity=".1"/><text x="101" y="317" fill="#ddd6fe">JD 结构化</text>
    <rect x="238" y="290" width="170" height="42" rx="21" fill="#ffffff" opacity=".1"/><text x="267" y="317" fill="#ddd6fe">简历证据映射</text>
    <rect x="422" y="290" width="150" height="42" rx="21" fill="#ffffff" opacity=".1"/><text x="449" y="317" fill="#ddd6fe">真题回流</text>
    <rect x="586" y="290" width="180" height="42" rx="21" fill="#ffffff" opacity=".1"/><text x="615" y="317" fill="#ddd6fe">2–3 分钟答案</text>
  </g>
  <rect x="74" y="374" width="430" height="4" rx="2" fill="url(#accent)"/>
  <text x="74" y="414" fill="#a7f3d0" font-family="Inter,Segoe UI,Noto Sans SC,sans-serif" font-size="18">Local-first · 事实优先 · 可安全升级 · 一键初始化</text>
  <g transform="translate(850 150)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M45 90h115M102 34v112" stroke="#8b5cf6" stroke-width="5" opacity=".6"/>
    <circle cx="45" cy="90" r="32" fill="#312e81" stroke="#a78bfa" stroke-width="3"/>
    <circle cx="160" cy="90" r="32" fill="#1e3a8a" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="102" cy="34" r="32" fill="#4c1d95" stroke="#c4b5fd" stroke-width="3"/>
    <circle cx="102" cy="146" r="32" fill="#064e3b" stroke="#6ee7b7" stroke-width="3"/>
    <text x="45" y="97" text-anchor="middle" fill="#fff" stroke="none" font-family="sans-serif" font-size="17">JD</text>
    <text x="160" y="97" text-anchor="middle" fill="#fff" stroke="none" font-family="sans-serif" font-size="17">真题</text>
    <text x="102" y="41" text-anchor="middle" fill="#fff" stroke="none" font-family="sans-serif" font-size="17">简历</text>
    <text x="102" y="153" text-anchor="middle" fill="#fff" stroke="none" font-family="sans-serif" font-size="17">反馈</text>
  </g>
</svg>

